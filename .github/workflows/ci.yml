name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: assertion-grep
        run: bash scripts/assertion-grep.sh
      - name: assertion-grep (similar-cases)
        run: bash scripts/check-similar-cases-assertions.sh
      - name: verify rule pack audit (issue #13)
        run: npm run verify:rule-pack-audit
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - name: apply D1 migrations (local)
        run: npx wrangler d1 migrations apply DB --local
      - name: seed similar-cases fixture (E2E only)
        # SERVICE_KEY is not available in CI, so the cases-indexer worker
        # cannot populate eia_cases. Seed 4 synthetic 육상풍력 cases
        # (TESTSEED-* prefix; not EIASS-derived) so cases-search-happy /
        # facet-combo / cases-axe specs have data.
        run: npx wrangler d1 execute DB --local --file=tests/e2e/fixtures/cases-seed.sql
      - run: npx playwright install --with-deps chromium
      - name: seed .dev.vars for E2E (Turnstile always-pass keys)
        # @astrojs/cloudflare platformProxy auto-loads .dev.vars so runtime.env
        # picks up these values inside Astro dev. The Turnstile site/secret
        # keys are Cloudflare's documented always-pass test keys — not secrets.
        # JWT_SECRET is a throwaway string valid only for this ephemeral runner.
        env:
          E2E_APP_PASSWORD: ${{ secrets.E2E_APP_PASSWORD || 'change-me-long-random' }}
        run: |
          cat > .dev.vars <<EOF
          APP_PASSWORD=${E2E_APP_PASSWORD}
          JWT_SECRET=ci-e2e-throwaway-secret-not-used-in-prod-0000000000000000
          TURNSTILE_SECRET_KEY=1x0000000000000000000000000000000AA
          TURNSTILE_SITE_KEY=1x00000000000000000000AA
          EOF
      - name: e2e
        env:
          E2E_APP_PASSWORD: ${{ secrets.E2E_APP_PASSWORD || 'change-me-long-random' }}
        run: npm run test:e2e -- --reporter=list
      - name: upload playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: warn
      - run: npm run build
      - name: verify CSS bundle
        run: bash scripts/check-build-css.sh
      - name: verify production env vars
        run: bash scripts/check-wrangler-prod-vars.sh
