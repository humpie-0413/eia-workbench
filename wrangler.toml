name = "eia-workbench"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "eia-workbench-v0"
database_id = "afca9a24-7725-4530-8c49-e3d001bd24d8"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "eia-workbench-v0-uploads"

# [vars] are local-dev defaults and preview-branch values. The Pages dashboard
# is locked once wrangler.toml declares [vars], so production values come from
# [env.production.vars] below (selected by `wrangler pages deploy --branch=main`).
[vars]
APP_ORIGIN = "http://localhost:3000"
TURNSTILE_SITE_KEY = "1x00000000000000000000AA"  # Cloudflare always-pass test key

# Secrets — [vars] 에 평문 금지. `wrangler pages secret put <KEY>` 로 주입.
# - APP_PASSWORD, JWT_SECRET, TURNSTILE_SECRET_KEY (기존)
# - SERVICE_KEY: 공공데이터포털 data.go.kr 일반 인증키. 상세: docs/adr/0001-eia-api-source.md

# Production environment — applied on `wrangler pages deploy --branch=main`.
# Cloudflare bindings (d1_databases, r2_buckets, vars) are non-inheritable:
# overriding vars under env.production forces restating D1 + R2 with identical
# values to the top-level blocks. See docs/plans/deploy-v0-wrangler-env-fix.md.
[[env.production.d1_databases]]
binding = "DB"
database_name = "eia-workbench-v0"
database_id = "afca9a24-7725-4530-8c49-e3d001bd24d8"
migrations_dir = "migrations"

[[env.production.r2_buckets]]
binding = "UPLOADS"
bucket_name = "eia-workbench-v0-uploads"

[env.production.vars]
APP_ORIGIN = "https://eia-workbench-v0.pages.dev"
TURNSTILE_SITE_KEY = "0x4AAAAAADAUrmpBcDS4csj4"
