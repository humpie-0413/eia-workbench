name = "eia-workbench-cleanup"
# main is resolved relative to this config file's location (workers/).
# DO NOT prefix with "workers/" — wrangler would look for workers/workers/cron-cleanup.ts
# and fail with "entry-point file ... was not found" (Windows: amplified by libuv crash).
main = "cron-cleanup.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "eia-workbench-v0"
database_id = "afca9a24-7725-4530-8c49-e3d001bd24d8"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "eia-workbench-v0-uploads"

[triggers]
crons = ["0 18 * * *"]  # 03:00 KST
