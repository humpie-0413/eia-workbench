version: onshore_wind/v2.2026-04-23
industry: onshore_wind

# rule pack audit meta — issue #13 법령 숫자 원문 대조 의무
# Ref: docs/findings/2026-04-22-scoping-rule-pack-legal-audit.md §8 (2026-04-23 재감사 결과)
rule_pack_audit:
  findings_doc: docs/findings/2026-04-22-scoping-rule-pack-legal-audit.md
  audit_verdict: PASS
  audit_date: '2026-04-23'
  source_pdfs:
    - data/rules/scoping/reference/enforcement-decree-eia-2025-02-18-annex-03.pdf.pdf
    - data/rules/scoping/reference/enforcement-decree-eia-2025-10-01-annex-04.pdf.pdf
    - data/rules/scoping/reference/enforcement-decree-forest-management-act-2023-06-07-annex-04.pdf.pdf

source_note: |
  이 rule pack 의 모든 숫자는 법제처 국가법령정보센터에서 수령한
  원문 PDF (data/rules/scoping/reference/) 와 대조되었음. 2026-04-23 재감사 PASS.

  한계:
  - 산지관리법 시행규칙 별표 4 미확보. 660㎡ 임계값은 시행령 별표 4 기준.
  - 풍력 세부 "경사도/임상 기준" 은 시행규칙 별표 수령 후 후속 rule pack 에서 확장.

rules:
  - id: eia_target_capacity
    title: '환경영향평가 대상 여부 — 발전시설용량 100 MW'
    category: eia_target
    when:
      gte:
        field: capacity_mw
        value: 100
    onUndefined: skip
    onTrue:
      result: likely_applicable
      basis:
        - id: eia_decree_annex3
          title: '환경영향평가법 시행령 별표 3 (제31조제2항 관련)'
          refLink: 'https://www.law.go.kr/'
          citation_url: 'https://www.law.go.kr/LSW/flDownload.do?flSeq=34819077'
      assumptions:
        - '사용자 입력 capacity_mw 는 단일 발전단지 총 시설용량 (허가 기준)'
      limits:
        - '시행령 별표 3 제3호 다목1) 원문: "태양력ㆍ풍력, 연료전지발전소 또는 발전사업용 전기저장장치의 경우에는 발전시설용량이 10만 킬로와트 이상인 것"'
        - '다른 부속 항목 (변전소·송전선로·변압기 등) 은 별도 규정 — 이 규칙 범위 외'
    onFalse:
      result: likely_not_applicable
      basis:
        - id: eia_decree_annex3
          title: '환경영향평가법 시행령 별표 3'
      assumptions: []
      limits:
        - '용량 100 MW 미만이어도 소규모 EIA 또는 소규모 환경영향평가 대상일 수 있음 (아래 규칙 참조)'

  - id: small_eia_conservation
    title: '소규모 환경영향평가 — 보전관리지역 5,000㎡'
    category: small_eia
    when:
      all_of:
        - equals:
            field: land_use_zone
            value: conservation_management
        - gte:
            field: site_area_m2
            value: 5000
    onUndefined: skip
    onTrue:
      result: likely_applicable
      basis:
        - id: eia_decree_annex4
          title: '환경영향평가법 시행령 별표 4 (제59조제1항 관련)'
          refLink: 'https://www.law.go.kr/'
          citation_url: 'https://www.law.go.kr/LSW/flDownload.do?flSeq=41077151'
      assumptions:
        - '사용자 입력 land_use_zone 은 국토계획법상 용도지역 분류와 일치'
        - 'site_area_m2 는 풍력발전기 부지 전체 면적 (설치면적 합계 기준)'
      limits:
        - '시행령 별표 4 제2호 다목: "관리지역 중 보전관리지역 5,000㎡ 이상"'
        - '인접한 여러 필지로 나눠 개발하는 경우 합산 여부는 실무 해석 차이 있음 — 전문가 확인 필요'
    onFalse:
      result: likely_not_applicable
      basis: []
      assumptions: []
      limits:
        - '보전관리지역 외 zone 이거나 5,000㎡ 미만 → 이 규칙 해당 없음. 다른 zone 규칙 참조.'

  - id: small_eia_planning
    title: '소규모 환경영향평가 — 계획관리지역 10,000㎡'
    category: small_eia
    when:
      all_of:
        - equals:
            field: land_use_zone
            value: planning_management
        - gte:
            field: site_area_m2
            value: 10000
    onUndefined: skip
    onTrue:
      result: likely_applicable
      basis:
        - id: eia_decree_annex4
          title: '환경영향평가법 시행령 별표 4'
      assumptions:
        - 'site_area_m2 는 풍력발전기 부지 전체 면적'
      limits:
        - '시행령 별표 4 제2호 다목: "관리지역 중 계획관리지역 10,000㎡ 이상"'
        - '생산관리지역은 농림·자연환경보전과 함께 별도 규칙 (small_eia_other_zones) 참조'
    onFalse:
      result: likely_not_applicable
      basis: []
      assumptions: []
      limits: []

  - id: small_eia_other_zones
    title: '소규모 환경영향평가 — 농림/자연환경보전/생산관리 3존 번들'
    category: small_eia
    when:
      all_of:
        - one_of:
            field: land_use_zone
            values:
              - agricultural_forestry
              - natural_environment_conservation
              - production_management
        - gte_by_zone:
            field: site_area_m2
            thresholds:
              agricultural_forestry: 7500
              natural_environment_conservation: 5000
              production_management: 7500
    onUndefined: skip
    onTrue:
      result: likely_applicable
      basis:
        - id: eia_decree_annex4
          title: '환경영향평가법 시행령 별표 4'
      assumptions:
        - 'land_use_zone 은 3개 zone 중 하나'
        - 'site_area_m2 가 해당 zone 의 임계값 이상'
      limits:
        - '시행령 별표 4 제2호: 농림지역 7,500㎡, 자연환경보전지역 5,000㎡, 생산관리지역 7,500㎡'
        - '각 zone 의 개별 임계값은 별표 4 의 별도 항목 (라·마·나목 등) — 전문가 확인 필요'
    onFalse:
      result: likely_not_applicable
      basis: []
      assumptions: []
      limits: []

  - id: forest_conversion_review
    title: '산지전용허가 — 660㎡ 이상 타당성조사 대상'
    category: forest_conversion
    when:
      gte:
        field: forest_conversion_m2
        value: 660
    onUndefined: skip
    onTrue:
      result: needs_check
      basis:
        - id: forest_decree_annex4
          title: '산지관리법 시행령 별표 4 (제20조제6항 관련)'
          refLink: 'https://www.law.go.kr/'
      assumptions:
        - '풍력발전시설의 산지전용 면적이 forest_conversion_m2'
      limits:
        - '시행령 별표 4 제2호 다목: 660㎡ 이상은 산지전용타당성조사 대상'
        - '660㎡ 미만이어도 산지전용허가 자체는 필요 (규모별 허가기준 별도) — 전문가 확인 필요'
        - '산지관리법 시행규칙 별표 4 미확보 (평균경사도·임상 등 세부 기준은 후속 rule pack 에서)'
    onFalse:
      result: likely_not_applicable
      basis: []
      assumptions: []
      limits:
        - '660㎡ 미만이라도 산지전용허가 절차는 필요 — 전문가 확인 필요'
